<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Games</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&family=Open+Sans:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="big-key-hint"></div>
    <div style="display:none">
      <span id="score"></span>
      <span id="level"></span>
    </div>
    
    <!-- Startscreen mit Spielauswahl -->
    <div class="startscreen" id="startscreen">
        <canvas id="trail-canvas"></canvas>
        <div class="startscreen-content">
            <h1 class="startscreen-cta" aria-hidden="true">
                <span class="startscreen-cta-wave">👉</span>
                <span class="startscreen-cta-text">Tipp ein Spiel!</span>
            </h1>
            <div class="game-select-menu" id="game-select-menu">
                <button class="game-select-btn game-select-btn--counting" data-game="counting" aria-label="Zählen">
                    <span class="game-select-icon">🔢</span>
                    <span class="game-select-label">Zählen</span>
                </button>
                <button class="game-select-btn game-select-btn--letters" data-game="letters" aria-label="Buchstaben">
                    <span class="game-select-icon">🔤</span>
                    <span class="game-select-label">Buchstaben</span>
                </button>
                <button class="game-select-btn game-select-btn--breakout" data-game="breakout" aria-label="Breakout">
                    <span class="game-select-icon">🧱</span>
                    <span class="game-select-label">Breakout</span>
                </button>
            </div>
        </div>
        <video class="startscreen-video" src="video/Comic_Julian_holding_emojis.mp4" loop autoplay muted playsinline></video>
    </div>

    <!-- Hauptspiel (anfangs versteckt) -->
    <div class="game-container" id="game-container" style="display: none;">
        <button id="close-btn" class="close-button" title="Schließen" aria-label="Schließen">✕</button>
        <div class="level-label">Level</div>
        <div class="level-indicator" id="level-indicator"></div>
        <div class="star-progress" id="star-progress"></div>
        <div class="objects-display" id="objects-display">
            <!-- Objekte werden hier angezeigt -->
        </div>
        <div class="number-buttons" id="numbers-container">
            <button class="number-btn" data-number="1">1</button>
            <button class="number-btn" data-number="2">2</button>
            <button class="number-btn" data-number="3">3</button>
            <button class="number-btn" data-number="4">4</button>
            <button class="number-btn" data-number="5">5</button>
            <button class="number-btn" data-number="6">6</button>
            <button class="number-btn" data-number="7">7</button>
            <button class="number-btn" data-number="8">8</button>
            <button class="number-btn" data-number="9">9</button>
        </div>
        <div class="controls controls-bottom-left">
            <button id="prev-track" class="game-button small" title="Vorheriger Track" aria-label="Vorheriger Track">⏮️</button>
            <button id="music-toggle" class="game-button small" title="Musik Pause/Weiter (M)" aria-label="Musik Pause/Weiter (M)">⏸️</button>
            <button id="next-track" class="game-button small" title="Nächster Track" aria-label="Nächster Track">⏭️</button>
            <button id="tracklist-toggle" class="game-button small" title="Musik-Auswahl" aria-label="Musik-Auswahl">🎵</button>
            <button id="numbers-toggle" class="game-button small" title="Zahlenfeld an/aus (N)" aria-label="Zahlenfeld an/aus (N)">🔢</button>
        </div>
    </div>
    <div class="celebration" id="celebration">
        <div class="celebration-content">
            <!-- Die Zahl wird dynamisch per JS als .celebration-number eingefügt -->
            <button id="next-level-btn" class="game-button" title="Weiter" aria-label="Weiter">➡️</button>
        </div>
    </div>
    <div class="success-screen" id="success-screen">
        <div class="success-number" id="success-number"></div>
    </div>

    <!-- Buchstabenspiel (anfangs versteckt) -->
    <div class="game-container letter-game-container" id="letter-game-container" style="display: none;">
        <button id="letter-close-btn" class="close-button" title="Schließen" aria-label="Schließen">&#x2715;</button>
        <button id="letter-parent-btn" class="parent-discover-btn" title="Eltern-Einstellungen" aria-label="Eltern-Einstellungen">&#x2699;&#xFE0F;</button>
        <div class="level-label">Level</div>
        <div class="level-indicator" id="letter-level-indicator"></div>
        <div class="star-progress" id="letter-star-progress"></div>
        <div class="letter-display" id="letter-display"></div>
        <div class="letter-answer-area" id="letter-answer-area"></div>
        <div class="letter-keyboard" id="letter-keyboard"></div>
        <div class="controls controls-bottom-left">
            <button id="letter-prev-track" class="game-button small" title="Vorheriger Track" aria-label="Vorheriger Track">&#x23EE;&#xFE0F;</button>
            <button id="letter-music-toggle" class="game-button small" title="Musik Pause/Weiter (M)" aria-label="Musik Pause/Weiter (M)">&#x23F8;&#xFE0F;</button>
            <button id="letter-next-track" class="game-button small" title="Nächster Track" aria-label="Nächster Track">&#x23ED;&#xFE0F;</button>
            <button id="letter-tracklist-toggle" class="game-button small" title="Musik-Auswahl" aria-label="Musik-Auswahl">&#x1F3B5;</button>
            <button id="letter-replay-btn" class="game-button small" title="Nochmal hören" aria-label="Nochmal hören">&#x1F50A;</button>
            <button id="letter-hint-btn" class="game-button small" title="Tipp" aria-label="Tipp">&#x1F4A1;</button>
        </div>
    </div>

    <script type="importmap">
    {
      "imports": {
        "onnxruntime-web": "https://esm.sh/onnxruntime-web@1.18.0"
      }
    }
    </script>
    <script type="module" src="piper-loader.js"></script>
    <script src="shared.js"></script>
    <script src="emoji-render.js"></script>
    <script src="script.js"></script>
    <script src="letter-game.js"></script>
</body>
</html>
