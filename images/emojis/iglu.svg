<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Iglu">
  <defs>
    <radialGradient id="iglu-dome" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#d7ecf7"/>
      <stop offset="100%" stop-color="#8fb8d1"/>
    </radialGradient>
    <linearGradient id="iglu-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e7f3fb"/>
      <stop offset="100%" stop-color="#b5d4e6"/>
    </linearGradient>
    <radialGradient id="iglu-entrance" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#355a75"/>
      <stop offset="100%" stop-color="#13283a"/>
    </radialGradient>
  </defs>

  <!-- Snowy ground -->
  <ellipse cx="128" cy="210" rx="112" ry="22" fill="url(#iglu-ground)"/>

  <!-- Dome body -->
  <path d="M40 200 A90 88 0 0 1 216 200 Z" fill="url(#iglu-dome)" stroke="#6a96b2" stroke-width="2"/>

  <!-- Ice-block seams: horizontal rings -->
  <g fill="none" stroke="#a9c9dc" stroke-width="2" stroke-linecap="round">
    <path d="M52 186 A78 76 0 0 1 204 186"/>
    <path d="M62 160 A68 64 0 0 1 194 160"/>
    <path d="M76 132 A54 50 0 0 1 180 132"/>
    <path d="M92 108 A38 34 0 0 1 164 108"/>
  </g>

  <!-- Ice-block seams: vertical separators (staggered like real masonry) -->
  <g fill="none" stroke="#a9c9dc" stroke-width="2" stroke-linecap="round">
    <!-- bottom ring -->
    <path d="M70 200 L66 186"/>
    <path d="M100 200 L98 186"/>
    <path d="M156 200 L158 186"/>
    <path d="M186 200 L190 186"/>
    <!-- second ring -->
    <path d="M82 186 L80 160"/>
    <path d="M124 186 L124 160"/>
    <path d="M172 186 L174 160"/>
    <!-- third ring -->
    <path d="M96 160 L94 132"/>
    <path d="M146 160 L148 132"/>
    <path d="M180 160 L182 132"/>
    <!-- fourth ring -->
    <path d="M108 132 L108 108"/>
    <path d="M148 132 L148 108"/>
    <!-- cap -->
    <path d="M128 108 L128 90"/>
  </g>

  <!-- Entrance tunnel (arch in front of the dome) -->
  <path d="M96 200 L96 178 A32 28 0 0 1 160 178 L160 200 Z" fill="url(#iglu-dome)" stroke="#6a96b2" stroke-width="2"/>
  <!-- Entrance opening -->
  <path d="M108 200 L108 184 A20 18 0 0 1 148 184 L148 200 Z" fill="url(#iglu-entrance)"/>

  <!-- Highlight on dome -->
  <path d="M78 104 A60 56 0 0 1 126 76" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.85"/>

  <!-- A couple of snowflakes for charm -->
  <g fill="#ffffff" opacity="0.9">
    <circle cx="36" cy="60" r="3"/>
    <circle cx="226" cy="92" r="3"/>
    <circle cx="210" cy="48" r="2"/>
    <circle cx="48" cy="110" r="2"/>
  </g>
</svg>
