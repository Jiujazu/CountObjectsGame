<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTIMATE BREAKOUT</title>
    <!-- style.css stellt die Shared-Komponenten zur Verfuegung
         (parent-overlay/parent-panel, close-confirm-overlay etc.), damit die
         Menues die gleiche Optik wie „Buchstaben" und „Zaehlen" haben. -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&family=Open+Sans:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="breakout.css">
</head>
<body>
    <div id="game-wrapper">
        <button id="pause-btn" title="Menü" aria-label="Menü">⏸️</button>
        <div id="hud">
            <span id="level-display">L 1</span>
            <span id="lives-display"></span>
        </div>
        <div id="canvas-holder">
            <canvas id="gameCanvas" width="480" height="600"></canvas>
        </div>
        <!-- Kombiniertes Menue: Pause + Eltern-Einstellungen in einem Panel. -->
        <div id="pause-overlay" class="parent-overlay hidden">
            <div class="parent-panel">
                <div class="parent-panel-header">
                    <h2 class="parent-panel-title">⏸️ Pause</h2>
                    <div class="parent-panel-subtitle" id="pause-stats"></div>
                </div>
                <div class="parent-panel-body">
                    <section class="parent-section">
                        <div class="parent-section-label">Spiel</div>
                        <div class="pause-menu">
                            <button class="pause-menu-btn" data-action="restart"><span class="pause-icon">🔄</span><span class="pause-label">Neustart</span></button>
                            <button class="pause-menu-btn pause-parent-only" data-action="nextLevel"><span class="pause-icon">⏭️</span><span class="pause-label">Level überspringen</span></button>
                            <button class="pause-menu-btn" data-action="quit"><span class="pause-icon">🏠</span><span class="pause-label">Zurück zum Menü</span></button>
                        </div>
                    </section>
                    <section class="parent-section">
                        <div class="parent-section-label">Einstellungen</div>
                        <div class="parent-field">
                            <div class="parent-field-head">
                                <span class="parent-field-label">Modus</span>
                            </div>
                            <div class="parent-presets" id="bp-mode-presets">
                                <button type="button" class="parent-preset" data-mode="kids">Kinder</button>
                                <button type="button" class="parent-preset" data-mode="normal">Normal</button>
                                <button type="button" class="parent-preset" data-mode="parent">Eltern-Test</button>
                            </div>
                            <div class="parent-helper" id="bp-mode-hint">Kinder: langsamer, sprechender Modus.</div>
                        </div>
                        <div class="parent-field">
                            <div class="parent-field-head">
                                <span class="parent-field-label">Startlevel</span>
                                <span class="parent-field-value" id="bp-level-val">1</span>
                            </div>
                            <div class="parent-stepper">
                                <button type="button" id="bp-level-down" aria-label="Level runter">−</button>
                                <span class="parent-stepper-value" id="bp-level-display">1</span>
                                <button type="button" id="bp-level-up" aria-label="Level hoch">+</button>
                            </div>
                        </div>
                        <button type="button" class="parent-btn parent-btn-secondary" id="bp-skins-btn">🎨 Paddle-Skins ändern</button>
                    </section>
                    <section class="parent-section">
                        <div class="parent-section-label">Audio</div>
                        <div class="parent-field">
                            <div class="parent-field-head">
                                <span class="parent-field-label">Musik-Lautstärke</span>
                                <span class="parent-field-value" id="bp-vol-val">13%</span>
                            </div>
                            <input type="range" id="bp-vol-slider" min="0" max="100" value="13">
                        </div>
                        <label class="parent-toggle">
                            <span class="parent-toggle-control"><input type="checkbox" id="bp-music-toggle"></span>
                            <span class="parent-toggle-text">
                                <span class="parent-toggle-label">Musik an</span>
                                <span class="parent-helper">Schaltet die Hintergrundmusik ein oder aus.</span>
                            </span>
                        </label>
                        <label class="parent-toggle">
                            <span class="parent-toggle-control"><input type="checkbox" id="bp-sfx-toggle"></span>
                            <span class="parent-toggle-text">
                                <span class="parent-toggle-label">Effekte &amp; Stimme an</span>
                                <span class="parent-helper">Soundeffekte und TTS. Im Kinder-Modus werden Events vorgelesen.</span>
                            </span>
                        </label>
                        <div class="parent-field">
                            <div class="parent-field-head">
                                <span class="parent-field-label">Stimme</span>
                            </div>
                            <div class="parent-voice-options">
                                <label class="parent-voice-option">
                                    <input type="radio" name="bp-voice" value="piper">
                                    <span class="parent-voice-text">
                                        <span class="parent-voice-label">Thorsten (offline)</span>
                                        <span class="parent-helper">Natürliche Kinderstimme. ~63 MB Download beim ersten Start.</span>
                                    </span>
                                </label>
                                <label class="parent-voice-option">
                                    <input type="radio" name="bp-voice" value="browser">
                                    <span class="parent-voice-text">
                                        <span class="parent-voice-label">Standard (Browser)</span>
                                        <span class="parent-helper">Eingebaut, Qualität variiert je nach Gerät.</span>
                                    </span>
                                </label>
                            </div>
                            <div class="parent-status" id="bp-tts-status"></div>
                        </div>
                    </section>
                </div>
                <div class="parent-panel-footer">
                    <button type="button" class="parent-btn parent-btn-primary" id="resume-btn">▶️ Weiter</button>
                </div>
            </div>
        </div>
        <div id="skins-overlay" class="hidden">
            <div class="start-text" style="font-size:1.8rem;margin-bottom:12px">PADDLE-SKINS</div>
            <div id="skins-grid"></div>
            <button id="skins-close-btn" class="skin-button" style="margin-top:12px">Zurück</button>
        </div>
        <div id="game-over-overlay" class="hidden">
            <div class="gameover-emoji" aria-hidden="true">💫</div>
            <div class="gameover-text">Nochmal?</div>
            <button class="retry-btn" data-action="retry">🔄</button>
            <div class="gameover-score"></div>
            <div class="gameover-highscore"></div>
        </div>
        <div id="win-overlay" class="hidden">
            <div class="win-emoji" aria-hidden="true">🎉</div>
            <div class="win-text">Super!</div>
            <button class="retry-btn" data-action="retry">🔄</button>
            <div class="win-score"></div>
            <div class="win-highscore"></div>
        </div>
        <div id="level-overlay" class="hidden">
            <div class="level-complete-text"></div>
            <div class="level-bonus-text"></div>
        </div>
        <div id="quit-confirm-overlay" class="hidden">
            <div class="quit-confirm-emoji" aria-hidden="true">👋</div>
            <div class="quit-confirm-text">Wirklich beenden?</div>
            <div class="quit-confirm-buttons">
                <button id="quit-confirm-no" class="quit-confirm-btn quit-no" aria-label="Nein, weiterspielen">✔</button>
                <button id="quit-confirm-yes" class="quit-confirm-btn quit-yes" aria-label="Ja, beenden">✕</button>
            </div>
        </div>
    </div>
    <!-- Piper TTS (gleich wie bei „Buchstaben"/„Zaehlen"): laedt das
         Thorsten-Modell offline, mit automatischem Fallback auf die
         Browser-Stimme falls das Modell nicht geladen werden kann. -->
    <script type="importmap">
    {
      "imports": {
        "onnxruntime-web": "https://esm.sh/onnxruntime-web@1.18.0"
      }
    }
    </script>
    <script type="module" src="piper-loader.js"></script>
    <script src="shared.js"></script>
    <script src="breakout.js"></script>
</body>
</html>
