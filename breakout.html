<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTIMATE BREAKOUT</title>
    <link rel="stylesheet" href="breakout.css">
</head>
<body>
    <div id="game-wrapper">
        <button id="back-btn" title="Zurück zum Menü" aria-label="Zurück zum Menü">✕</button>
        <div id="hud">
            <span id="score-display">Score: 0</span>
            <span id="level-display">Level 1</span>
            <span id="highscore-display">HI: 0</span>
            <span id="lives-display"></span>
        </div>
        <canvas id="gameCanvas" width="480" height="600"></canvas>
        <div id="start-overlay">
            <div class="start-text">ULTIMATE<br>BREAKOUT</div>
            <div class="start-options">
                <div class="start-option-row">
                    <span class="option-label">Modus:</span>
                    <button id="mode-toggle" class="option-btn">Normal</button>
                </div>
                <div class="start-option-row">
                    <span class="option-label">Level:</span>
                    <button id="level-toggle" class="option-btn">1</button>
                </div>
            </div>
            <div class="start-sub">Leertaste oder Enter zum Starten</div>
            <div class="start-hint">Pfeiltasten / Maus / Touch &middot; Escape = Pause</div>
            <button id="skins-btn" class="skin-button">Paddle-Skins</button>
        </div>
        <div id="skins-overlay" class="hidden">
            <div class="start-text" style="font-size:1.8rem;margin-bottom:12px">PADDLE-SKINS</div>
            <div id="skins-grid"></div>
            <button id="skins-close-btn" class="skin-button" style="margin-top:12px">Zurück</button>
        </div>
        <div id="game-over-overlay" class="hidden">
            <div class="gameover-text">GAME OVER</div>
            <div class="gameover-score"></div>
            <div class="gameover-highscore"></div>
            <div class="start-sub">Klick oder Leertaste zum Neustarten</div>
        </div>
        <div id="win-overlay" class="hidden">
            <div class="win-text">DU BIST EINE LEGENDE!</div>
            <div class="win-score"></div>
            <div class="win-highscore"></div>
            <div class="start-sub">Klick oder Leertaste zum Neustarten</div>
        </div>
        <div id="level-overlay" class="hidden">
            <div class="level-complete-text"></div>
            <div class="level-bonus-text"></div>
        </div>
        <div id="pause-overlay" class="hidden">
            <div class="pause-text">PAUSE</div>
            <div class="pause-menu">
                <button class="pause-menu-btn selected" data-action="resume">Weiterspielen</button>
                <button class="pause-menu-btn" data-action="restart">Neustart</button>
                <button class="pause-menu-btn" data-action="quit">Hauptmen&uuml;</button>
            </div>
            <div class="pause-hint">Pfeiltasten + Enter</div>
        </div>
    </div>
    <script src="breakout.js"></script>
</body>
</html>
